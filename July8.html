<!DOCTYPE html>
<html>
<head>
    <title>Instagram Create Account</title>
</head>
<body>

<center>

<form>
<table border="0" cellpadding="8">

    <tr>
       <th colspan="2"><i>Instagram</i></th>
    </tr>

    <tr>
        <th colspan="2">Create New Account</th>
    </tr>

    <tr>
        <td>Mobile Number or Email</td>
        <td><input type="tel" name="email" placeholder="Enter Mobile Number or Email" required></td>
    </tr>

    <tr>
        <td>Password</td>
        <td><input type="password" name="password" placeholder="Enter Password" required></td>
    </tr>

    <tr>
        <td>Date of Birth</td>
        <td><input type="date" required></td>
    </tr>

    <tr>
        <td> Name</td>
        <td><input type="text" placeholder="Enter Full Name" required></td>
    </tr>

    <tr>
        <td>Username</td>
        <td><input type="text" placeholder="Enter Username" required></td>
    </tr>

    <tr>
        <td>Confirm Password</td>
        <td><input type="password" placeholder="Confirm Password" required></td>
    </tr>

    <tr>
        <td>Gender</td>
        <td>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <input type="checkbox" required>
            I agree to the Terms & Conditions
        </td>
    </tr>

    <tr>
        <td colspan="2" align="center">
            <input type="submit" value="Create Account">
            <input type="reset" value="Reset">
        </td>
    </tr>

    <tr>
        <td colspan="2" align="center">
            Already have an account?
            <a href="login.html">Log In</a>
        </td>
    </tr>

</table>
</form>

</center>

</body>
</html>
