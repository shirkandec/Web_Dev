<!DOCTYPE html>
<html>
<head>
    <title>Company</title>
</head>
<body>
 <body bgcolor="lightblue">

<center>

<form action="#no_action" method="post">
  
<table border="0" cellpadding="10" cellspacing="0">
          
    <tr>
      <th colspan="2">
        <h1>Company Level Task</h1> 
        <hr>
      </th>
    </tr>

    <tr>
      <td><b>Name: </b></td>
      <td><input type="text" required></td>
    </tr>
              
    <tr>
      <td><b>DOB: </b></td>
      <td><input type="date" required></td>
    </tr>
    <tr>
      <td><b>Country: </b></td>
                <td>
                  <select name="country" required>
                        <option value="">Select Country</option>
                        <option value="usa">USA</option>
                        <option value="canada">Canada</option>
                        <option value="uk">UK</option>
                        <option value="India">India</option>
                        <option value="Australia">Australia</option>
                        <option value="Germany">Germany</option>
                    </select>
              </td>
        </tr>

        <tr>
          <td><b>Address: </b>
          </td>
          <td><textarea rows="4" cols="50" required></textarea>
          </td>
        </tr>
        <tr>
          <td><b>Email: </b>
        </td>
          <td>
            <input type="email" required><br><br>
          </td>
        </tr>
        <tr><td><b>Phone Number: </b></td>
          <td><input type="tel"  required><br><br>
          </td>
        </tr>
        <tr><td><b>Gender: </b>
        </td>
        
        <td>
        <input type="radio" name="gender" value="male" required> Male
        <input type="radio" name="gender" value="female" required> Female <br>
      </td>
        <tr>
          <td><b>Technology Known: 
          </td></b>
          <br>
        
        <td><input type="checkbox" name="tech" value="python"> Python
        <input type="checkbox" name="tech" value="java"> Java
        <input type="checkbox" name="tech" value="c++"> C++ <br>
       
        </td>
        </tr>

        <tr>
          <td colspan="2" align="center">
          <button type="submit">  Submit</button>
        </td>
      </tr>
       </table>  
      </form>
        
       
      
    </center>
    </body>
</html>
